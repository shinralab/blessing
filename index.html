<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Blessing For You</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@300;400&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #e8c97a;
    --gold-soft: #f0dfa0;
    --cream: #fdf8f0;
    --deep: #0d0a1a;
    --mist: rgba(255,255,255,0.06);
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--deep);
    cursor: default;
  }

  /* Full-page canvas background */
  #cosmos {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  /* Radial glow center */
  .glow-core {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,201,122,0.07) 0%, rgba(180,140,255,0.04) 40%, transparent 70%);
    pointer-events: none;
    z-index: 1;
    animation: breathe 8s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
    50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
  }

  /* Main content */
  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    gap: 0;
  }

  /* Intro state */
  .intro {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    text-align: center;
    padding: 40px;
    transition: opacity 1.2s ease, transform 1.2s ease;
  }

  .intro.hidden {
    opacity: 0;
    transform: translateY(-20px);
    pointer-events: none;
  }

  .eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    font-weight: 300;
    letter-spacing: 6px;
    color: var(--gold);
    opacity: 0.7;
    text-transform: uppercase;
    animation: fadeup 2s ease 0.5s both;
  }

  .title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2.8rem, 7vw, 5.5rem);
    color: var(--cream);
    line-height: 1.1;
    letter-spacing: 1px;
    animation: fadeup 2s ease 0.8s both;
  }

  .title em {
    font-style: italic;
    color: var(--gold-soft);
  }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.05rem;
    color: rgba(255,255,255,0.45);
    letter-spacing: 1px;
    max-width: 380px;
    line-height: 1.8;
    animation: fadeup 2s ease 1.1s both;
  }

  /* Bless button */
  .bless-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 5px;
    color: var(--deep);
    background: linear-gradient(135deg, var(--gold) 0%, #f5e0a0 50%, var(--gold) 100%);
    border: none;
    padding: 18px 52px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    animation: fadeup 2s ease 1.4s both;
    box-shadow: 0 0 30px rgba(232,201,122,0.2), 0 0 60px rgba(232,201,122,0.08);
  }

  .bless-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.3) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: transform 0.6s ease;
  }

  .bless-btn:hover { transform: translateY(-2px); box-shadow: 0 0 50px rgba(232,201,122,0.35), 0 8px 30px rgba(0,0,0,0.3); }
  .bless-btn:hover::before { transform: translateX(100%); }
  .bless-btn:active { transform: translateY(0px); }

  @keyframes fadeup {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---- BLESSING STATE ---- */
  .blessing-scene {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 15;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.5s ease;
  }

  .blessing-scene.active {
    opacity: 1;
    pointer-events: all;
  }

  /* Sacred symbol */
  .mandala {
    position: relative;
    width: 180px;
    height: 180px;
    margin-bottom: 48px;
    animation: mandala-spin 40s linear infinite;
  }

  @keyframes mandala-spin { to { transform: rotate(360deg); } }

  .mandala svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 18px rgba(232,201,122,0.5));
  }

  /* Scroll text container */
  .scroll-blessing {
    width: min(680px, 90vw);
    text-align: center;
    position: relative;
  }

  .scroll-inner {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(1.2rem, 2.5vw, 1.6rem);
    line-height: 2;
    color: rgba(255, 248, 230, 0.9);
    letter-spacing: 0.5px;
  }

  .scroll-inner span {
    display: inline;
    opacity: 0;
    animation: word-appear 0.6s ease forwards;
  }

  /* Fade edges */
  .scroll-blessing::before,
  .scroll-blessing::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 60px;
    z-index: 2;
    pointer-events: none;
  }
  .scroll-blessing::before {
    top: 0;
    background: linear-gradient(to bottom, var(--deep), transparent);
  }
  .scroll-blessing::after {
    bottom: 0;
    background: linear-gradient(to top, var(--deep), transparent);
  }

  @keyframes word-appear {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Golden divider line */
  .divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 32px auto;
    opacity: 0;
    transition: opacity 1s ease 2s;
  }

  .blessing-scene.active .divider { opacity: 1; }

  /* Again button */
  .again-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 5px;
    color: var(--gold);
    background: transparent;
    border: 1px solid rgba(232,201,122,0.3);
    padding: 12px 32px;
    cursor: pointer;
    transition: all 0.3s;
    opacity: 0;
    margin-top: 32px;
    text-transform: uppercase;
  }

  .again-btn:hover { border-color: var(--gold); background: rgba(232,201,122,0.05); }

  /* bottom attribution */
  .attribution {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.18);
    letter-spacing: 2px;
    z-index: 20;
    white-space: nowrap;
  }
</style>
</head>
<body>

<canvas id="cosmos"></canvas>
<div class="glow-core"></div>

<!-- INTRO -->
<div class="stage">
  <div class="intro" id="intro">
    <div class="eyebrow">From the universe, to you</div>
    <h1 class="title">May you receive<br><em>a blessing</em></h1>
    <p class="subtitle">Still your mind for a moment.<br>Something good is on its way to you.</p>
    <button class="bless-btn" onclick="beginBlessing()">BLESS ME</button>
  </div>
</div>

<!-- BLESSING SCENE -->
<div class="blessing-scene" id="blessing-scene">
  <div class="mandala">
    <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">

        <ellipse cx="100" cy="30" rx="8" ry="22" transform="rotate(330 100 100)"/>

      <!-- Inner petals -->
      <g stroke="rgba(232,201,122,0.6)" stroke-width="0.6" fill="none">
        <ellipse cx="100" cy="60" rx="5" ry="14" transform="rotate(0 100 100)"/>
        <ellipse cx="100" cy="60" rx="5" ry="14" transform="rotate(45 100 100)"/>

        <ellipse cx="100" cy="60" rx="5" ry="14" transform="rotate(135 100 100)"/>
        <ellipse cx="100" cy="60" rx="5" ry="14" transform="rotate(180 100 100)"/>
        <ellipse cx="100" cy="60" rx="5" ry="14" transform="rotate(225 100 100)"/>
        <ellipse cx="100" cy="60" rx="5" ry="14" transform="rotate(270 100 100)"/>
        <ellipse cx="100" cy="60" rx="5" ry="14" transform="rotate(315 100 100)"/>
      </g>
      <!-- Inner ring -->
      <circle cx="100" cy="100" r="30" stroke="rgba(232,201,122,0.5)" stroke-width="0.6"/>
      <circle cx="100" cy="100" r="18" stroke="rgba(232,201,122,0.6)" stroke-width="0.6"/>
      <!-- Center star -->
      <g stroke="rgba(232,201,122,0.9)" stroke-width="0.8" fill="rgba(232,201,122,0.1)">
        <polygon points="100,85 104,96 116,96 106,104 110,115 100,108 90,115 94,104 84,96 96,96" />
      </g>
      <!-- Center dot -->
      <circle cx="100" cy="100" r="3" fill="rgba(232,201,122,0.9)"/>
    </svg>
  </div>

  <div class="scroll-blessing">
    <div class="scroll-inner" id="blessing-text"></div>
  </div>

  <div class="divider"></div>
  <button class="again-btn" id="again-btn" onclick="resetBlessing()">receive another blessing</button>
</div>

<div class="attribution">with love · open to all</div>

<script>
// ─── CANVAS PARTICLE SYSTEM ───────────────────────────────────────────────────
const canvas = document.getElementById('cosmos');
const ctx = canvas.getContext('2d');
let W, H, particles = [], stars = [], burstActive = false;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Static deep stars
function initStars() {
  stars = [];
  for (let i = 0; i < 220; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.2,
      alpha: Math.random() * 0.5 + 0.1,
      twinkleSpeed: Math.random() * 0.01 + 0.003,
      twinkleOffset: Math.random() * Math.PI * 2
    });
  }
}
initStars();

// Floating motes (always present, slow)
function initMotes() {
  for (let i = 0; i < 35; i++) {
    particles.push(createMote());
  }
}

function createMote(fromCenter = false) {
  const cx = W / 2, cy = H / 2;
  return {
    type: 'mote',
    x: fromCenter ? cx + (Math.random() - 0.5) * 100 : Math.random() * W,
    y: fromCenter ? cy + (Math.random() - 0.5) * 100 : Math.random() * H,
    vx: (Math.random() - 0.5) * 0.18,
    vy: -Math.random() * 0.25 - 0.05,
    r: Math.random() * 1.8 + 0.4,
    alpha: Math.random() * 0.5 + 0.15,
    maxAlpha: Math.random() * 0.5 + 0.15,
    life: 1,
    decay: Math.random() * 0.0008 + 0.0003,
    hue: Math.random() < 0.6 ? 45 : (Math.random() < 0.5 ? 280 : 200),
    sat: Math.random() * 30 + 60,
    lit: 70 + Math.random() * 20,
  };
}

// BURST — called when blessing triggers
function burst() {
  burstActive = true;
  const cx = W / 2, cy = H / 2;
  for (let i = 0; i < 160; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 0.5;
    const isGold = Math.random() < 0.7;
    particles.push({
      type: 'spark',
      x: cx + (Math.random() - 0.5) * 60,
      y: cy + (Math.random() - 0.5) * 60,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - Math.random() * 2,
      r: Math.random() * 2.5 + 0.5,
      alpha: 1,
      life: 1,
      decay: Math.random() * 0.012 + 0.006,
      gravity: 0.04,
      hue: isGold ? 45 : (Math.random() < 0.5 ? 280 : 200),
      sat: isGold ? 80 : 90,
      lit: isGold ? 75 : 80,
      trail: [],
    });
  }
  // Shimmer rings
  for (let i = 0; i < 5; i++) {
    particles.push({
      type: 'ring',
      x: cx, y: cy,
      r: 0,
      maxR: 80 + i * 60,
      alpha: 0.6,
      life: 1,
      decay: 0.008 + i * 0.002,
      hue: 45,
    });
  }
}

function updateDraw() {
  ctx.clearRect(0, 0, W, H);

  // Deep space gradient
  const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.7);
  bg.addColorStop(0, '#1a1230');
  bg.addColorStop(0.5, '#0e0b1e');
  bg.addColorStop(1, '#060410');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Stars twinkle
  const t = Date.now() * 0.001;
  stars.forEach(s => {
    const a = s.alpha * (0.6 + 0.4 * Math.sin(t * s.twinkleSpeed * 60 + s.twinkleOffset));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,250,230,${a})`;
    ctx.fill();
  });

  // Particles
  particles = particles.filter(p => p.life > 0);

  particles.forEach(p => {
    if (p.type === 'mote') {
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;
      const a = p.alpha * p.life;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue},${p.sat}%,${p.lit}%,${a})`;
      ctx.fill();
      // Tiny glow
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
      g.addColorStop(0, `hsla(${p.hue},${p.sat}%,${p.lit}%,${a * 0.3})`);
      g.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 4, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();

      if (p.life <= 0) Object.assign(p, createMote());

    } else if (p.type === 'spark') {
      p.trail.push({ x: p.x, y: p.y });
      if (p.trail.length > 5) p.trail.shift();
      p.x += p.vx;
      p.y += p.vy;
      p.vy += p.gravity;
      p.vx *= 0.99;
      p.life -= p.decay;
      const a = p.alpha * Math.pow(p.life, 0.7);
      // Trail
      if (p.trail.length > 1) {
        ctx.beginPath();
        ctx.moveTo(p.trail[0].x, p.trail[0].y);
        for (let i = 1; i < p.trail.length; i++) ctx.lineTo(p.trail[i].x, p.trail[i].y);
        ctx.strokeStyle = `hsla(${p.hue},${p.sat}%,${p.lit}%,${a * 0.3})`;
        ctx.lineWidth = p.r * 0.5;
        ctx.stroke();
      }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue},${p.sat}%,${p.lit}%,${a})`;
      ctx.fill();

    } else if (p.type === 'ring') {
      p.r += (p.maxR - p.r) * 0.05;
      p.life -= p.decay;
      const a = p.alpha * p.life * p.life;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.strokeStyle = `hsla(${p.hue},70%,75%,${a})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  });

  // Replenish motes
  while (particles.filter(p => p.type === 'mote').length < 35) {
    particles.push(createMote());
  }

  requestAnimationFrame(updateDraw);
}
initMotes();
updateDraw();


// ─── BLESSING TEXT ─────────────────────────────────────────────────────────────
const blessings = [
  "Be still for just a moment. You are held by something vast and ancient — the same force that turns the tide, that grows the oak from the acorn, that painted the rings of Saturn. You belong to this universe completely, and it knows your name.",
  "May the weight you carry feel lighter today. May you find small moments of grace in ordinary things — the warmth of a cup, a glimpse of sky, the quiet kindness of your own breathing. You deserve peace. You deserve rest.",
  "Something good is moving toward you, even now, even in the quiet. You are not forgotten. The universe keeps account of every kind thing you have done, every time you chose courage, every dawn you met with an open heart.",
  "You are made of star-stuff and sea-memory. There is ancient light coded into you. Whatever you are facing right now, you have faced the dark before and found your way through. Trust that knowing. Trust yourself.",
  "May abundance find you — not only in coin or comfort, but in laughter that catches you off guard, in love that grows quietly, in moments that make you glad to be alive. These are already on their way to you.",
  "The universe does not make mistakes. You arrived here, in this body, in this time, with these exact gifts, for reasons still unfolding. You don't have to have it all figured out. You just have to keep going. And you are.",
  "Be gentle with yourself today. You are doing something remarkably hard — being a person in a complex world — and you are doing it with more grace than you know. Someone, somewhere, is grateful you exist exactly as you are.",
  "May you sleep deeply and dream sweetly. May tomorrow bring clarity where today brought confusion. May your path become more visible with each step you take in faith. The light ahead is real. Keep walking toward it.",
  "There are invisible threads connecting you to every person who has ever loved you, every place that has ever felt like home, every moment that cracked you open and let in more light. You are woven into something beautiful. You always have been.",
  "May your hands find the work that feels like prayer. May your voice find the words that have been waiting inside you. May your feet know, without asking, the direction of your truest path. You were made for a life that matters — and you are already living it.",
  "Release what the day took from you. Breathe it out slowly, like smoke, like winter breath, like the last note of a song. You don't have to carry all of it. The night is large enough to hold what you cannot. Rest now. Begin again softly.",
  "Something in you has survived every hard thing so far. Every dark season. Every loss that seemed unsurvivable. Every morning you weren't sure you could face. That something is not small. It is ancient and stubborn and quietly magnificent. Honor it.",
  "May the people who love you find the right words today. May a stranger offer you unexpected kindness. May you catch a glimpse of yourself — just for a moment — the way those who cherish you see you. You are more than you believe. So much more.",
  "The answers you are searching for are not hiding from you. They are composting slowly in the dark, turning into something richer than a quick answer ever could be. Trust the not-knowing. It is doing necessary work. Wisdom grows in its own time.",

function getBlessing() {
  return blessings[Math.floor(Math.random() * blessings.length)];
}

// ─── SOUND: gentle chime using Web Audio ──────────────────────────────────────
function playChime() {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523.25, 659.25, 783.99, 1046.5, 1318.5]; // C5 E5 G5 C6 E6
    notes.forEach((freq, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ac.currentTime);
      const startTime = ac.currentTime + i * 0.18;
      gain.gain.setValueAtTime(0, startTime);
      gain.gain.linearRampToValueAtTime(0.12, startTime + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, startTime + 2.2);
      osc.start(startTime);
      osc.stop(startTime + 2.5);
    });
    // Soft pad underneath
    const pad = ac.createOscillator();
    const padGain = ac.createGain();
    pad.connect(padGain);
    padGain.connect(ac.destination);
    pad.type = 'sine';
    pad.frequency.setValueAtTime(261.63, ac.currentTime);
    padGain.gain.setValueAtTime(0, ac.currentTime);
    padGain.gain.linearRampToValueAtTime(0.04, ac.currentTime + 0.3);
    padGain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 5);
    pad.start(ac.currentTime);
    pad.stop(ac.currentTime + 5.5);
  } catch(e) {}
}

// ─── STATE MACHINE ─────────────────────────────────────────────────────────────
let blessingActive = false;

function beginBlessing() {
  if (blessingActive) return;
  blessingActive = true;

  playChime();
  burst();

  // Hide intro
  document.getElementById('intro').classList.add('hidden');

  // After brief pause, show blessing
  setTimeout(() => {
    const scene = document.getElementById('blessing-scene');
    scene.classList.add('active');
    animateBlessingText(getBlessing());
  }, 800);
}

function animateBlessingText(text) {
  const container = document.getElementById('blessing-text');
  container.innerHTML = '';
  const words = text.split(' ');
  words.forEach((word, i) => {
    const span = document.createElement('span');
    span.textContent = word + ' ';
    span.style.animationDelay = `${0.8 + i * 0.07}s`;
    container.appendChild(span);
  });

  // Show "again" button after text finishes
  const totalTime = 800 + words.length * 70 + 1200;
  setTimeout(() => {
    const btn = document.getElementById('again-btn');
    btn.style.transition = 'opacity 1.5s ease';
    btn.style.opacity = '1';
  }, totalTime);
}

function resetBlessing() {
  blessingActive = false;
  const scene = document.getElementById('blessing-scene');
  scene.classList.remove('active');
  document.getElementById('again-btn').style.opacity = '0';
  document.getElementById('blessing-text').innerHTML = '';

  setTimeout(() => {
    const intro = document.getElementById('intro');
    intro.classList.remove('hidden');
    // Re-trigger button with new blessing immediately available
  }, 400);
}
